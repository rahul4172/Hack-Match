version: '3.8'
services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CORS_ORIGIN=*
      - JWT_SECRET=change_this_to_a_random_secret_in_production
      # TODO: replace with your values for any other variables
    volumes:
      - ./data:/app/data # For SQLite database if needed, although current DB is in /app
    restart: unless-stopped
