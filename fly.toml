app = "hackmatch"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "5000"
  NODE_ENV = "production"
  CORS_ORIGIN = "*"
  # Set JWT_SECRET via flyctl secrets set JWT_SECRET=your_secret

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

# [[mounts]] # Uncomment for persistent SQLite data
#   source = "hackmatch_data"
#   destination = "/app/data"
